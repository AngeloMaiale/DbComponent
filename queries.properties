crear_tabla_usuarios=CREATE TABLE IF NOT EXISTS usuarios (id INTEGER PRIMARY KEY, nombre VARCHAR(100), email VARCHAR(100))
limpiar_tabla=DELETE FROM usuarios
ver_usuarios=SELECT * FROM usuarios LIMIT 10
insertar_usuario=INSERT INTO usuarios (nombre, email) VALUES (?, ?)
actualizar_puntos=UPDATE usuarios SET puntos = ? WHERE nombre = ?
contar_usuarios=SELECT COUNT(*) as total FROM usuarios
actualizar_usuario=UPDATE usuarios SET nombre = ? WHERE id = ?
probar_db=SELECT 1
actualizar_email_por_id=UPDATE usuarios SET email = ? WHERE id = ?
eliminar_usuario_por_id=DELETE FROM usuarios WHERE id = ?
ver_usuarios_resumido=SELECT id, nombre, email FROM usuarios ORDER BY id DESC LIMIT 5