# ==========================================
# CONFIGURACIÓN DE TABLAS (DDL)
# ==========================================

# Crea la tabla si no existe. 
# Nota: INTEGER PRIMARY KEY en SQLite actúa como AutoIncrement automáticamente.
crear_tabla_usuarios=CREATE TABLE IF NOT EXISTS usuarios (id INTEGER PRIMARY KEY, nombre VARCHAR(100), email VARCHAR(100))

# Limpia la tabla para pruebas de simulación desde cero
limpiar_tabla=DELETE FROM usuarios

# ==========================================
# CONSULTAS DE SIMULACIÓN (DML)
# ==========================================

# Selección simple (La que usas en el botón de probar conexión)
ver_usuarios=SELECT * FROM usuarios LIMIT 10

# Inserción para simular carga de datos
insertar_usuario=INSERT INTO usuarios (nombre, email) VALUES (?, ?)

# Conteo para verificar cuántos registros procesó la simulación
contar_usuarios=SELECT COUNT(*) as total FROM usuarios

# Actualización (Para simular procesos más pesados)
actualizar_usuario=UPDATE usuarios SET nombre = ? WHERE id = ?

# ==========================================
# CONSULTAS DE DIAGNÓSTICO
# ==========================================
probar_db=SELECT 1